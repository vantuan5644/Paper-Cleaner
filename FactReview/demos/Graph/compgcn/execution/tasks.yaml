- id: install_deps
  family: prepare
  cwd: '{paper_root}'
  cmd:
  - python
  - -m
  - pip
  - install
  - -r
  - '{paper_root}/requirements.txt'
  timeout_sec: 3600
  use_conda: true
  enabled: false
- id: train_fb237_transe
  family: train
  dataset: FB15k-237
  cwd: '{paper_root}'
  cmd:
  - python
  - run.py
  - -name
  - fb237_transe
  - -data
  - FB15k-237
  - -score_func
  - transe
  - -opn
  - sub
  - -gpu
  - '1'
  - -epoch
  - '200'
  - -num_workers
  - '4'
  - -gamma
  - '9.0'
  - -init_dim
  - '200'
  - -gcn_dim
  - '200'
  - -hid_drop
  - '0.1'
  timeout_sec: 43200
  use_conda: true
  artifact_paths:
  - checkpoints/*
  - log/*
- id: eval_fb237_transe
  family: eval
  dataset: FB15k-237
  claims:
  - 'Table 4: TransE+CompGCN(Sub) on FB15k-237, MRR=0.335, MR=194, H@10=0.514'
  cwd: '{paper_root}'
  cmd:
  - python
  - codeeval_eval_ckpt.py
  - --ckpt-dir
  - ./checkpoints
  - --prefix
  - fb237_transe
  - --out
  - ./metrics/fb237_transe_test.json
  - --split
  - test
  timeout_sec: 1800
  use_conda: true
  artifact_paths:
  - metrics/fb237_transe_test.json
